    <style>
        :root {
            --gold-light: #E8C95A; --gold: #D4AF37; --gold-dark: #B8960F;
            --gold-gradient: linear-gradient(135deg, #E8C95A, #D4AF37, #B8960F);
            --font-heading: 'Poppins', sans-serif; --font-body: 'Inter', sans-serif;
            --radius: 12px; --radius-sm: 8px; --radius-lg: 20px;
            --transition: 0.25s ease; --transition-fast: 0.15s ease;
            --sidebar-w: 260px; --sidebar-collapsed: 64px; --header-h: 60px;
        }
        [data-theme="light"] {
            --bg: #F8F6F0; --bg2: #FFFFFF; --bg3: #F0EDE5;
            --glass: rgba(255,255,255,0.8); --text: #0A0A0A; --text2: #333;
            --text3: #777; --border: rgba(0,0,0,0.06); --border2: rgba(0,0,0,0.12);
            --shadow: 0 4px 16px rgba(0,0,0,0.08); --shadow-md: 0 8px 32px rgba(0,0,0,0.10);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.12);
            --hover: rgba(212,175,55,0.06); --active: rgba(212,175,55,0.12);
            --success: #10B981; --error: #DC2626; --warning: #F59E0B; --info: #3B82F6;
        }
        [data-theme="dark"] {
            --bg: #0A0A0A; --bg2: #1A1A1A; --bg3: #252525; --glass: rgba(10,10,10,0.9);
            --text: #FFFFFF; --text2: #CCCCCC; --text3: #888;
            --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
            --shadow: 0 4px 16px rgba(0,0,0,0.5); --shadow-md: 0 8px 32px rgba(0,0,0,0.6);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.7);
            --hover: rgba(255,255,255,0.06); --active: rgba(212,175,55,0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; font-size: 16px; }
        body {
            font-family: var(--font-body); font-size: 14px; line-height: 1.6;
            color: var(--text); background: var(--bg); margin: 0; padding: 0;
            display: flex; min-height: 100vh; overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--gold-dark); text-decoration: none; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
        .skip-link { position: fixed; top: -100%; left: 16px; z-index: 9999; padding: 12px 20px; background: var(--gold); color: #000; font-weight: 700; border-radius: 8px; }
        .skip-link:focus { top: 16px; }
        .sb { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 300; transition: width var(--transition), transform var(--transition); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .sb.collapsed { width: var(--sidebar-collapsed); }
        .sb-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; height: var(--header-h); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .sb-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; min-width: 0; }
        .sb-logo svg { width: 34px; height: 34px; flex-shrink: 0; }
        .sb-brand { font-family: var(--font-heading); font-weight: 800; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; transition: opacity var(--transition); }
        .sb-brand-sub { font-size: 9px; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.05em; }
        .collapsed .sb-brand, .collapsed .sb-brand-sub { opacity: 0; width: 0; }
        .sb-collapse { margin-left: auto; width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); color: var(--text3); cursor: pointer; font-size: 13px; transition: all var(--transition); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .sb-collapse:hover { background: var(--hover); color: var(--text); border-color: var(--gold); }
        .sb-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px; }
        .nav-sec { margin-bottom: 14px; }
        .nav-sec-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 12px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; transition: opacity var(--transition); }
        .collapsed .nav-sec-title { opacity: 0; height: 0; padding: 0; margin: 0; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; color: var(--text2); transition: all var(--transition-fast); cursor: pointer; white-space: nowrap; overflow: hidden; min-height: 42px; width: 100%; text-align: left; background: none; border: none; }
        .nav-item:hover { background: var(--hover); color: var(--text); }
        .nav-item.active { background: var(--active); color: var(--gold-dark); font-weight: 600; border-left: 3px solid var(--gold); padding-left: 11px; }
        .nav-item.hidden { display: none !important; }
        .nav-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
        .nav-label { overflow: hidden; text-overflow: ellipsis; transition: opacity var(--transition); }
        .collapsed .nav-label { opacity: 0; width: 0; }
        .sb-footer { padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .sb-user { display: flex; align-items: center; gap: 10px; padding: 6px; border-radius: var(--radius); cursor: pointer; transition: background var(--transition-fast); }
        .sb-user:hover { background: var(--hover); }
        .sb-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--gold-gradient); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; font-family: var(--font-heading); }
        .sb-user-info { overflow: hidden; transition: opacity var(--transition); min-width: 0; }
        .collapsed .sb-user-info { opacity: 0; width: 0; }
        .sb-user-name { font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sb-user-role { font-size: 10px; color: var(--text3); }
        .main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; transition: margin-left var(--transition); }
        .sb.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }
        .main-header { position: sticky; top: 0; z-index: 200; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); height: var(--header-h); display: flex; align-items: center; padding: 0 20px; gap: 14px; flex-shrink: 0; }
        .main-header .menu-btn { display: none; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; align-items: center; justify-content: center; font-size: 18px; transition: all var(--transition-fast); flex-shrink: 0; }
        .main-header .brand-text { font-family: var(--font-heading); font-weight: 800; font-size: 16px; color: var(--text); white-space: nowrap; }
        .main-header .brand-sub { font-size: 9px; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.05em; }
        .main-header .spacer { flex: 1; }
        .hdr-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all var(--transition-fast); flex-shrink: 0; text-decoration: none; }
        .hdr-btn:hover { background: var(--hover); color: var(--text); border-color: var(--gold); }
        .hdr-profile { width: 40px; height: 40px; border-radius: 50%; background: var(--gold-gradient); color: #000; border: none; cursor: pointer; font-weight: 700; font-size: 14px; font-family: var(--font-heading); transition: all var(--transition-fast); flex-shrink: 0; }
        .content-frame { flex: 1; border: none; width: 100%; min-height: calc(100vh - var(--header-h)); }
        .sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 299; }
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); z-index: 200; padding: 6px 10px; padding-bottom: max(6px, env(safe-area-inset-bottom)); justify-content: space-around; align-items: center; box-shadow: 0 -4px 16px rgba(0,0,0,0.06); }
        .mobile-nav a { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 8px; border-radius: 8px; font-size: 10px; color: var(--text3); transition: all var(--transition-fast); min-width: 50px; text-decoration: none; }
        .mobile-nav a.active { color: var(--gold-dark); font-weight: 600; }
        @media (max-width: 1024px) {
            .sb { transform: translateX(-100%); width: var(--sidebar-w); }
            .sb.mobile-open { transform: translateX(0); box-shadow: var(--shadow-lg); }
            .sb-overlay.show { display: block; }
            .main { margin-left: 0 !important; }
            .main-header .menu-btn { display: flex; }
            .mobile-nav { display: flex; }
            .content-frame { min-height: calc(100vh - var(--header-h) - 56px); }
        }
        .approval-banner { background: #FEF3C7; color: #92400E; text-align: center; padding: 10px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #FCD34D; display: none; }
        .approval-banner.show { display: block; }
        .loading-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 99999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

    <script>
        'use strict';
        
        var S = {
            collapsed: false,
            mobile: false,
            dark: false,
            currentPage: 'dashboard',
            pendingApproval: false,
            userProfile: null
        };

        function $(id) { return document.getElementById(id); }
        function showToast(msg, type) { var t = document.createElement('div'); t.className = 'toast toast-' + (type||'info'); t.textContent = msg; ($('toastContainer')||document.body).appendChild(t); setTimeout(function(){ t.remove(); }, 3000); }
        function escHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

        function navigatePage(page) {
            if (!page || page === S.currentPage) return;
            S.currentPage = page;
            $('contentFrame').src = 'pages/' + page + '.html';
            document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.toggle('active', el.dataset.page === page); });
            document.querySelectorAll('.mobile-nav a').forEach(function(el) { el.classList.toggle('active', el.dataset.page === page); });
            if (S.mobile) closeMobile();
            try { localStorage.setItem('crm_last_page', page); } catch(e) {}
        }

        function toggleSidebar() { S.collapsed=!S.collapsed; $('sidebar').classList.toggle('collapsed',S.collapsed); $('sbCollapse').innerHTML=S.collapsed?'▶':'◀'; try{localStorage.setItem('crm_sb',S.collapsed?'1':'0');}catch(e){} }
        function openMobile() { S.mobile=true; $('sidebar').classList.add('mobile-open'); $('sbOverlay').classList.add('show'); document.body.style.overflow='hidden'; }
        function closeMobile() { S.mobile=false; $('sidebar').classList.remove('mobile-open'); $('sbOverlay').classList.remove('show'); document.body.style.overflow=''; }
        function toggleTheme() { S.dark=!S.dark; document.documentElement.setAttribute('data-theme',S.dark?'dark':'light'); $('themeBtn').innerHTML=S.dark?'☀️':'🌙'; try{localStorage.setItem('crm_theme',S.dark?'dark':'light');}catch(e){} }
        function loadTheme() { var t=localStorage.getItem('crm_theme'); S.dark=t==='dark'; document.documentElement.setAttribute('data-theme',S.dark?'dark':'light'); $('themeBtn').innerHTML=S.dark?'☀️':'🌙'; }

        function updateUserUI() {
            var p = S.userProfile;
            if (!p || !p.role) { try { var ud = localStorage.getItem('crm_user'); if (ud) p = JSON.parse(ud); } catch(e) {} }
            if (!p) return;
            S.userProfile = p;
            var name = p.displayName || p.name || p.email || 'User';
            var av = name.charAt(0).toUpperCase();
            var role = p.role || 'User';
            var elAv = $('sbAvatar'); if (elAv) elAv.textContent = av;
            var elHd = $('hdrAvatar'); if (elHd) elHd.textContent = av;
            var elNm = $('sbUserName'); if (elNm) elNm.textContent = name;
            var elRl = $('sbUserRole'); if (elRl) elRl.textContent = role;
            if (p.approvalStatus === 'pending') { var b = $('approvalBanner'); if (b) b.classList.add('show'); }
        }

        function applyRBACFilter() {
            var p = S.userProfile;
            if (!p) return;
            var role = p.role || 'EXECUTIVE';
            var modules = p.moduleAccess || [];
            
            console.log('🔧 RBAC Filter — Role:', role, 'Modules:', modules);
            
            document.querySelectorAll('.nav-item[data-module]').forEach(function(el) {
                var mod = el.dataset.module;
                if (!mod) return;
                
                if (role === 'PLATFORM_OWNER') { el.classList.remove('hidden'); return; }
                if (mod === 'PLATFORM_ADMIN') { el.classList.add('hidden'); return; }
                if (mod === 'TENANT_ADMIN') { el.classList.toggle('hidden', ['TENANT_ADMIN','SUB_ADMIN'].indexOf(role) === -1); return; }
                el.classList.toggle('hidden', modules.indexOf(mod) === -1);
            });
            
            document.querySelectorAll('.nav-sec').forEach(function(sec) {
                var v = sec.querySelectorAll('.nav-item:not(.hidden)');
                sec.style.display = v.length === 0 ? 'none' : '';
            });
        }

        async function doLogout() { if (window.CRM_Auth && window.CRM_Auth.logout) { await window.CRM_Auth.logout(); } else { try { localStorage.clear(); } catch(e) {} window.location.href = 'index.html'; } }

        async function init() {
            loadTheme();
            try { if (localStorage.getItem('crm_sb') === '1') { S.collapsed = true; $('sidebar').classList.add('collapsed'); $('sbCollapse').innerHTML = '▶'; } } catch(e) {}
            
            var lastPage = 'dashboard';
            try { lastPage = localStorage.getItem('crm_last_page') || 'dashboard'; } catch(e) {}
            $('contentFrame').src = 'pages/' + lastPage + '.html';
            S.currentPage = lastPage;
            
            function cr() { var m = window.innerWidth <= 1024; $('mobileMenuBtn').style.display = m ? 'flex' : 'none'; $('mobileNav').style.display = m ? 'flex' : 'none'; }
            window.addEventListener('resize', cr); cr();

            if (window.CRM_Auth && window.CRM_Auth.onAuthStateChange) {
                window.CRM_Auth.onAuthStateChange(async function(s) {
                    if (s.isAuthenticated && s.authState === 'authenticated') {
                        console.log('✅ Auth OK');
                        
                        try {
                            var fbUser = window.firebase.auth().currentUser;
                            if (fbUser && fbUser.uid && window.CRM_Firestore && window.CRM_Firestore.isAvailable()) {
                                var doc = await window.CRM_Firestore.getDocument('users', fbUser.uid);
                                if (doc && doc.role) {
                                    S.userProfile = doc;
                                    console.log('👤 Firestore role:', doc.role);
                                }
                            }
                        } catch(e) { console.error('Firestore fetch error:', e); }
                        
                        if (!S.userProfile || !S.userProfile.role) {
                            try {
                                var cachedUser = localStorage.getItem('crm_user');
                                if (cachedUser) {
                                    S.userProfile = JSON.parse(cachedUser);
                                    console.log('👤 localStorage role:', S.userProfile.role);
                                }
                            } catch(e) {}
                        }
                        
                        if (window.CRM_Tenant && window.CRM_Tenant.initTenantContext) {
                            try { await window.CRM_Tenant.initTenantContext(); } catch(e) {}
                        }
                        
                        updateUserUI();
                        
                        if (S.userProfile && S.userProfile.role === 'PLATFORM_OWNER') {
                            document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('hidden'); });
                            document.querySelectorAll('.nav-sec').forEach(function(sec) { sec.style.display = ''; });
                            console.log('✅ All modules visible (Platform Owner)');
                        } else {
                            applyRBACFilter();
                        }
                        
                        var ls = $('loadingScreen'); if (ls) ls.style.display = 'none';
                    } else if (s.authState === 'unauthenticated') {
                        window.location.href = 'index.html';
                    }
                });
            } else {
                try { var ud = localStorage.getItem('crm_user'); if (ud) { S.userProfile = JSON.parse(ud); updateUserUI(); } } catch(e) {}
                $('loadingScreen').style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

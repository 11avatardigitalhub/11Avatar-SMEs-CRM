<!DOCTYPE html>
<html lang="en" data-theme="internal">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#F8F6F0" />
    <title>WhatsApp - 11 Avatar Digital Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/crm-design-system.css" />
    <link rel="stylesheet" href="../css/app.css" />
    
    <style>
        :root {
            --card-3d: 0 4px 6px -1px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.05);
            --card-hover: 0 10px 25px -5px rgba(0,0,0,0.08), 0 20px 40px -10px rgba(0,0,0,0.06);
            --gold: #D4AF37; --gold-dark: #B8960F; --gold-gradient: linear-gradient(135deg, #E8C95A, #D4AF37, #B8960F);
            --wa-green: #25D366; --wa-dark: #128C7E; --wa-gradient: linear-gradient(135deg, #25D366, #128C7E);
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6;
            color: #0A0A0A; background: linear-gradient(135deg, #F8F6F0, #F3F1EB, #F0EDE5, #F5F3ED);
            min-height: 100vh; -webkit-font-smoothing: antialiased; margin: 0;
        }
        
        .wa-container { max-width: 1400px; margin: 0 auto; padding: 24px; padding-bottom: 100px; }
        
        .bottom-submenu {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: #FFF; border-top: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
            padding: 8px 16px; padding-bottom: max(8px, env(safe-area-inset-bottom));
            display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
            justify-content: center; flex-wrap: wrap;
        }
        .bottom-submenu::-webkit-scrollbar { display: none; }
        .bottom-tab {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            padding: 10px 16px; border-radius: 12px; cursor: pointer;
            font-size: 0.7rem; font-weight: 500; color: #777;
            transition: all 0.2s ease; white-space: nowrap; min-width: 65px;
            border: 1.5px solid transparent; background: transparent;
        }
        .bottom-tab:hover { background: rgba(37,211,102,0.05); color: #333; }
        .bottom-tab.active { background: rgba(37,211,102,0.1); color: #128C7E; font-weight: 600; border-color: rgba(37,211,102,0.3); }
        .bottom-tab .tab-icon { font-size: 1.3rem; }
        
        .page-header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
            padding: 24px 28px; background: linear-gradient(135deg, #FFF, #F0FAF4, #E8F5EF);
            border: 1px solid rgba(37,211,102,0.2); border-radius: 20px;
            box-shadow: var(--card-3d); margin-bottom: 20px;
        }
        .page-header h1 { font-size: 1.6rem; font-weight: 800; margin: 0; }
        .page-header .wa-text { background: linear-gradient(135deg, #25D366, #128C7E); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header p { color: #888; margin: 2px 0 0; font-size: 0.88rem; }
        
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: all 0.2s ease; border: none; text-decoration: none; }
        .btn-primary { background: var(--gold-gradient); color: #FFF; }
        .btn-primary:hover { box-shadow: 0 4px 20px rgba(212,175,55,0.3); transform: translateY(-1px); }
        .btn-wa { background: var(--wa-gradient); color: #FFF; }
        .btn-wa:hover { box-shadow: 0 4px 20px rgba(37,211,102,0.3); transform: translateY(-1px); }
        .btn-outline { background: transparent; color: #128C7E; border: 1.5px solid #25D366; }
        .btn-outline:hover { background: rgba(37,211,102,0.08); }
        .btn-sm { padding: 6px 14px; font-size: 0.78rem; }
        .btn-xs { padding: 3px 8px; font-size: 0.68rem; border-radius: 5px; }
        .btn-ghost { background: transparent; color: #666; }
        .btn-ghost:hover { background: #F5F5F5; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
        @media(max-width:768px){ .stats-row{grid-template-columns:repeat(2,1fr);} }
        .stat-card {
            background: #FFF; border: 1px solid rgba(0,0,0,0.06); border-radius: 14px;
            padding: 16px 18px; cursor: pointer; transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--card-hover); border-color: rgba(37,211,102,0.2); }
        .stat-card .val { font-size: 1.5rem; font-weight: 800; font-family: 'Poppins',sans-serif; }
        .stat-card .lbl { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .card { background: #FFF; border: 1px solid rgba(0,0,0,0.06); border-radius: 20px; padding: 24px; box-shadow: var(--card-3d); margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-title { font-size: 1.1rem; font-weight: 700; font-family: 'Poppins',sans-serif; }
        
        /* Chat Interface */
        .chat-container { display: flex; gap: 0; border-radius: 16px; overflow: hidden; border: 1px solid rgba(0,0,0,0.08); min-height: 500px; max-height: 70vh; }
        .chat-sidebar { width: 300px; background: #FAFAFA; border-right: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; flex-shrink: 0; }
        .chat-sidebar-header { padding: 16px; border-bottom: 1px solid rgba(0,0,0,0.06); }
        .chat-sidebar-search { padding: 10px 14px; }
        .chat-sidebar-search input { width: 100%; padding: 9px 14px; border: 1.5px solid #E5E5E5; border-radius: 10px; font-size: 0.85rem; }
        .chat-sidebar-search input:focus { border-color: #25D366; outline: none; }
        .chat-contacts { flex: 1; overflow-y: auto; }
        .chat-contact {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px;
            cursor: pointer; transition: all 0.15s ease; border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .chat-contact:hover, .chat-contact.active { background: rgba(37,211,102,0.06); }
        .chat-contact-avatar {
            width: 44px; height: 44px; border-radius: 50%; background: var(--wa-gradient);
            color: #FFF; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem; flex-shrink: 0;
        }
        .chat-contact-info { flex: 1; min-width: 0; }
        .chat-contact-name { font-weight: 600; font-size: 0.9rem; }
        .chat-contact-last { font-size: 0.78rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-contact-time { font-size: 0.7rem; color: #999; flex-shrink: 0; }
        
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #FFF; }
        .chat-main-header { padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background: #F5F5F5; }
        .chat-msg {
            max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 0.9rem;
            line-height: 1.5; position: relative; word-wrap: break-word;
        }
        .chat-msg.sent { align-self: flex-end; background: #DCF8C6; border-bottom-right-radius: 4px; }
        .chat-msg.received { align-self: flex-start; background: #FFF; border-bottom-left-radius: 4px; border: 1px solid #E5E5E5; }
        .chat-msg .msg-time { font-size: 0.68rem; color: #888; margin-top: 4px; text-align: right; }
        .chat-msg .msg-status { font-size: 0.68rem; color: #34B7F1; }
        .chat-input-area { padding: 14px 20px; border-top: 1px solid rgba(0,0,0,0.06); display: flex; gap: 10px; align-items: center; background: #FFF; }
        .chat-input-area input { flex: 1; padding: 12px 18px; border: 1.5px solid #E5E5E5; border-radius: 24px; font-size: 0.9rem; }
        .chat-input-area input:focus { border-color: #25D366; outline: none; }
        .chat-send-btn {
            width: 44px; height: 44px; border-radius: 50%; background: var(--wa-gradient);
            color: #FFF; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: all 0.2s ease; flex-shrink: 0;
        }
        .chat-send-btn:hover { box-shadow: 0 4px 16px rgba(37,211,102,0.3); transform: scale(1.05); }
        
        /* Template Cards */
        .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .template-card {
            background: #FFF; border: 1px solid rgba(0,0,0,0.06); border-radius: 14px;
            padding: 18px; transition: var(--transition); cursor: pointer;
        }
        .template-card:hover { transform: translateY(-2px); box-shadow: var(--card-hover); border-color: rgba(37,211,102,0.3); }
        .template-card .t-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; }
        .template-card .t-preview { font-size: 0.82rem; color: #888; margin-bottom: 10px; line-height: 1.5; background: #F5F5F5; padding: 10px; border-radius: 8px; }
        .template-card .t-footer { display: flex; justify-content: space-between; align-items: center; }
        
        /* Filters */
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .filter-row input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1.5px solid #E5E5E5; border-radius: 10px; font-size: 0.88rem; }
        .filter-row input:focus { border-color: #25D366; outline: none; }
        
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: #FFF; border-radius: 12px; padding: 14px 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); font-size: 0.88rem; font-weight: 500; animation: toastIn 0.3s ease; }
        .toast-success { border-left: 4px solid #10B981; } .toast-error { border-left: 4px solid #DC2626; } .toast-info { border-left: 4px solid #3B82F6; }
        @keyframes toastIn { from{opacity:0;transform:translateX(100%);} to{opacity:1;transform:translateX(0);} }
        
        .empty-state { text-align: center; padding: 50px; color: #999; }
        .empty-icon { font-size: 3.5rem; margin-bottom: 10px; opacity: 0.5; }
        
        .text-xs { font-size: 0.75rem; } .text-sm { font-size: 0.85rem; } .text-muted { color: #888; }
        .font-semibold { font-weight: 600; }
        .flex { display: flex; } .items-center { align-items: center; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
        .flex-wrap { flex-wrap: wrap; } .flex-between { justify-content: space-between; }
        .mt-2 { margin-top: 8px; } .mb-2 { margin-bottom: 8px; }
        
        @media(max-width:768px){ .wa-container{padding:16px;padding-bottom:100px;} .page-header{padding:18px;flex-direction:column;text-align:center;} .chat-container{flex-direction:column;min-height:400px;} .chat-sidebar{width:100%;max-height:200px;} .chat-msg{max-width:90%;} }
    </style>
</head>
<body>

    <div class="wa-container">
        
        <div class="page-header">
            <div>
                <h1>💬 <span class="wa-text">WhatsApp</span> Connect</h1>
                <p id="waCountText">CloudWA-powered messaging</p>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button class="btn btn-outline btn-sm" onclick="WhatsApp.currentTab='templates';WhatsApp.render()">📝 Templates</button>
                <button class="btn btn-wa btn-sm" onclick="WhatsApp.openNewChat()">💬 New Chat</button>
            </div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card"><div class="val" id="stat-sent" style="color:#25D366;">0</div><div class="lbl">Messages Sent</div></div>
            <div class="stat-card"><div class="val" id="stat-delivered" style="color:#128C7E;">0</div><div class="lbl">✅ Delivered</div></div>
            <div class="stat-card"><div class="val" id="stat-templates">0</div><div class="lbl">📝 Templates</div></div>
            <div class="stat-card"><div class="val" id="stat-contacts">0</div><div class="lbl">👥 Active Chats</div></div>
        </div>
        
        <!-- TAB: Chat -->
        <div id="tab-chat" class="tab-content active">
            <div class="chat-container">
                <div class="chat-sidebar">
                    <div class="chat-sidebar-header"><strong>💬 Conversations</strong></div>
                    <div class="chat-sidebar-search"><input type="search" id="contactSearch" placeholder="🔍 Search contacts..." oninput="WhatsApp.filterContacts()"></div>
                    <div class="chat-contacts" id="contactList"></div>
                </div>
                <div class="chat-main" id="chatMain">
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <h4>Select a conversation</h4>
                        <p class="text-muted">Choose a contact from the left to start messaging</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- TAB: Templates -->
        <div id="tab-templates" class="tab-content">
            <div class="filter-row">
                <input type="search" id="templateSearch" placeholder="🔍 Search templates..." oninput="WhatsApp.filterTemplates()">
                <button class="btn btn-outline btn-sm" onclick="WhatsApp.addTemplate()">➕ New Template</button>
            </div>
            <div class="template-grid" id="templateGrid"></div>
        </div>
        
        <!-- TAB: Broadcast -->
        <div id="tab-broadcast" class="tab-content">
            <div class="card" style="max-width:700px;">
                <div class="card-header"><span class="card-title">📢 Broadcast Message</span></div>
                <div class="form-group"><label>Select Recipients</label><div id="broadcastContacts" class="flex flex-wrap gap-2"></div></div>
                <div class="form-group"><label>Message</label><textarea id="broadcastMsg" rows="4" placeholder="Type your broadcast message..."></textarea></div>
                <button class="btn btn-wa mt-2" onclick="WhatsApp.sendBroadcast()">📢 Send Broadcast</button>
            </div>
        </div>
        
    </div>
    
    <!-- Bottom Submenu -->
    <div class="bottom-submenu">
        <div class="bottom-tab active" onclick="WhatsApp.currentTab='chat';WhatsApp.render()"><span class="tab-icon">💬</span> Chat</div>
        <div class="bottom-tab" onclick="WhatsApp.currentTab='templates';WhatsApp.render()"><span class="tab-icon">📝</span> Templates</div>
        <div class="bottom-tab" onclick="WhatsApp.currentTab='broadcast';WhatsApp.render()"><span class="tab-icon">📢</span> Broadcast</div>
        <div class="bottom-tab" onclick="window.location.href='leads.html'"><span class="tab-icon">👥</span> Leads</div>
        <div class="bottom-tab" onclick="window.location.href='clients.html'"><span class="tab-icon">🏢</span> Clients</div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        'use strict';
        
        var WhatsApp = {
            currentTab: 'chat',
            activeChat: null,
            contactSearch: '',
            templateSearch: '',
            
            init: function() {
                this.messages = JSON.parse(localStorage.getItem('crm_wa_messages') || '[]');
                this.templates = JSON.parse(localStorage.getItem('crm_wa_templates') || '[]');
                if (this.templates.length === 0) this.seedTemplates();
                this.contacts = this.getContacts();
                this.render();
            },
            
            getContacts: function() {
                var contacts = [];
                var leads = JSON.parse(localStorage.getItem('crm_leads') || '[]');
                var clients = JSON.parse(localStorage.getItem('crm_clients') || '[]');
                leads.forEach(function(l) { if (l.mobile) contacts.push({ id: l.id, name: l.name, mobile: l.mobile, type: 'lead', business: l.business || '' }); });
                clients.forEach(function(c) { if (c.mobile) contacts.push({ id: c.id, name: c.name, mobile: c.mobile, type: 'client', business: c.business || '' }); });
                return contacts;
            },
            
            seedTemplates: function() {
                this.templates = [
                    { id: 'TPL001', title: 'Welcome Message', body: 'Hi {{name}}, thank you for connecting with 11 Avatar Digital Hub! We look forward to working with you. 🚀', category: 'Welcome' },
                    { id: 'TPL002', title: 'Payment Reminder', body: 'Dear {{name}}, this is a gentle reminder that your payment of ₹{{amount}} for {{service}} is due on {{date}}. Please process at your earliest convenience. 🙏', category: 'Payment' },
                    { id: 'TPL003', title: 'Follow-up', body: 'Hi {{name}}, just following up on our previous conversation about {{topic}}. Let me know if you have any questions! 😊', category: 'Follow-up' },
                    { id: 'TPL004', title: 'Invoice Sent', body: 'Dear {{name}}, your invoice #{{invoice}} for ₹{{amount}} has been generated. You can view it here: {{link}} 📄', category: 'Invoice' },
                    { id: 'TPL005', title: 'Meeting Confirmation', body: 'Hi {{name}}, confirming our meeting on {{date}} at {{time}}. Looking forward to discussing {{topic}} with you! 📅', category: 'Meeting' }
                ];
                localStorage.setItem('crm_wa_templates', JSON.stringify(this.templates));
            },
            
            saveMessages: function() { try { localStorage.setItem('crm_wa_messages', JSON.stringify(this.messages)); } catch(e) {} },
            
            getChats: function() {
                var self = this;
                var chats = {};
                this.messages.forEach(function(m) {
                    var key = m.contactId;
                    if (!chats[key]) chats[key] = { contactId: m.contactId, contactName: m.contactName, contactMobile: m.contactMobile, lastMsg: m, unread: 0 };
                    chats[key].lastMsg = m;
                });
                return Object.values(chats).sort(function(a, b) { return new Date(b.lastMsg.time) - new Date(a.lastMsg.time); });
            },
            
            getChatMessages: function(contactId) {
                return this.messages.filter(function(m) { return m.contactId === contactId; }).sort(function(a, b) { return new Date(a.time) - new Date(b.time); });
            },
            
            render: function() {
                var tabs = ['chat', 'templates', 'broadcast'];
                document.querySelectorAll('.bottom-tab').forEach(function(tab, i) {
                    if (i < tabs.length) tab.classList.toggle('active', tabs[i] === WhatsApp.currentTab);
                });
                
                document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
                var tabEl = document.getElementById('tab-' + this.currentTab);
                if (tabEl) tabEl.classList.add('active');
                
                document.getElementById('stat-sent').textContent = this.messages.length;
                document.getElementById('stat-delivered').textContent = this.messages.filter(function(m) { return m.status === 'delivered'; }).length;
                document.getElementById('stat-templates').textContent = this.templates.length;
                document.getElementById('stat-contacts').textContent = this.getChats().length;
                
                if (this.currentTab === 'chat') this.renderChat();
                if (this.currentTab === 'templates') this.renderTemplates();
                if (this.currentTab === 'broadcast') this.renderBroadcast();
            },
            
            renderChat: function() {
                var self = this;
                var chats = this.getChats();
                var contactList = document.getElementById('contactList');
                
                contactList.innerHTML = chats.length === 0 ? '<div class="empty-state" style="padding:30px;"><p class="text-muted">No conversations yet</p></div>' :
                    chats.map(function(chat) {
                        var isActive = self.activeChat === chat.contactId;
                        return '<div class="chat-contact' + (isActive ? ' active' : '') + '" onclick="WhatsApp.openChat(\'' + chat.contactId + '\')">' +
                            '<div class="chat-contact-avatar">' + (chat.contactName || '?').charAt(0).toUpperCase() + '</div>' +
                            '<div class="chat-contact-info"><div class="chat-contact-name">' + self.esc(chat.contactName) + '</div>' +
                            '<div class="chat-contact-last">' + self.esc(chat.lastMsg ? (chat.lastMsg.type === 'sent' ? 'You: ' : '') + chat.lastMsg.text : '') + '</div></div>' +
                            '<div class="chat-contact-time">' + self.timeAgo(chat.lastMsg ? chat.lastMsg.time : '') + '</div></div>';
                    }).join('');
                
                if (this.activeChat) this.renderChatMessages(this.activeChat);
            },
            
            openChat: function(contactId) {
                this.activeChat = contactId;
                this.renderChat();
            },
            
            renderChatMessages: function(contactId) {
                var self = this;
                var contact = this.contacts.find(function(c) { return c.id === contactId; });
                var msgs = this.getChatMessages(contactId);
                var chatMain = document.getElementById('chatMain');
                
                chatMain.innerHTML = '<div class="chat-main-header"><div class="chat-contact-avatar">' + (contact ? contact.name.charAt(0) : '?') + '</div><div><strong>' + self.esc(contact ? contact.name : 'Unknown') + '</strong><br><span class="text-xs text-muted">' + (contact ? contact.mobile : '') + '</span></div></div>' +
                    '<div class="chat-messages" id="chatMessages">' +
                        (msgs.length === 0 ? '<div class="empty-state"><p>Start the conversation! 👋</p></div>' : msgs.map(function(m) {
                            return '<div class="chat-msg ' + (m.type === 'sent' ? 'sent' : 'received') + '">' +
                                '<div>' + self.esc(m.text) + '</div>' +
                                '<div class="msg-time">' + self.timeAgo(m.time) + (m.type === 'sent' ? ' <span class="msg-status">✓✓</span>' : '') + '</div></div>';
                        }).join('')) +
                    '</div>' +
                    '<div class="chat-input-area"><input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\')WhatsApp.sendMessage()"><button class="chat-send-btn" onclick="WhatsApp.sendMessage()">➤</button></div>';
                
                setTimeout(function() {
                    var msgContainer = document.getElementById('chatMessages');
                    if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
                }, 100);
            },
            
            sendMessage: function() {
                var input = document.getElementById('msgInput');
                var text = input?.value?.trim();
                if (!text || !this.activeChat) return;
                
                var contact = this.contacts.find(function(c) { return c.id === WhatsApp.activeChat; });
                this.messages.push({
                    id: 'MSG' + Date.now(),
                    contactId: this.activeChat,
                    contactName: contact ? contact.name : 'Unknown',
                    contactMobile: contact ? contact.mobile : '',
                    text: text,
                    type: 'sent',
                    status: 'delivered',
                    time: new Date().toISOString()
                });
                this.saveMessages();
                input.value = '';
                this.renderChatMessages(this.activeChat);
                this.render();
            },
            
            openNewChat: function() {
                var self = this;
                var contacts = this.contacts;
                var h = '<div style="position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;" onclick="this.remove()"><div class="card" style="width:400px;max-width:90vw;max-height:80vh;overflow-y:auto;" onclick="event.stopPropagation()"><div class="card-header"><span class="card-title">💬 New Chat</span><button class="btn btn-ghost btn-xs" onclick="this.closest(\'div[style]\').remove()">✕</button></div>' +
                    '<input type="search" placeholder="🔍 Search contacts..." style="width:100%;margin-bottom:12px;padding:10px;border:1.5px solid #E5E5E5;border-radius:8px;" oninput="var s=this.value.toLowerCase();document.querySelectorAll(\'.nc-contact\').forEach(function(c){c.style.display=c.textContent.toLowerCase().includes(s)?\'flex\':\'none\';})">' +
                    contacts.map(function(c) {
                        return '<div class="nc-contact" style="display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;border-radius:8px;" onclick="WhatsApp.activeChat=\'' + c.id + '\';WhatsApp.currentTab=\'chat\';WhatsApp.render();this.closest(\'div[style]\').remove();" onmouseover="this.style.background=\'#F5F5F5\'" onmouseout="this.style.background=\'transparent\'">' +
                            '<div style="width:38px;height:38px;border-radius:50%;background:var(--wa-gradient);color:#FFF;display:flex;align-items:center;justify-content:center;font-weight:700;">' + c.name.charAt(0) + '</div>' +
                            '<div><strong>' + self.esc(c.name) + '</strong><br><span class="text-xs text-muted">📱 ' + c.mobile + ' · ' + c.type + '</span></div></div>';
                    }).join('') + '</div></div>';
                document.body.insertAdjacentHTML('beforeend', h);
            },
            
            renderTemplates: function() {
                var self = this;
                var search = (document.getElementById('templateSearch')?.value || '').toLowerCase();
                var filtered = this.templates.filter(function(t) { return !search || t.title.toLowerCase().includes(search) || t.body.toLowerCase().includes(search); });
                document.getElementById('templateGrid').innerHTML = filtered.map(function(t) {
                    return '<div class="template-card" onclick="WhatsApp.useTemplate(\'' + t.id + '\')">' +
                        '<div class="t-title">' + self.esc(t.title) + '</div>' +
                        '<div class="t-preview">' + self.esc(t.body.substring(0, 120)) + '...</div>' +
                        '<div class="t-footer"><span class="text-xs text-muted">📂 ' + self.esc(t.category) + '</span><button class="btn btn-outline btn-xs" onclick="event.stopPropagation();WhatsApp.useTemplate(\'' + t.id + '\')">Use</button></div></div>';
                }).join('');
            },
            
            useTemplate: function(templateId) {
                var t = this.templates.find(function(x) { return x.id === templateId; });
                if (!t) return;
                var contacts = this.contacts;
                var h = '<div style="position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;" onclick="this.remove()"><div class="card" style="width:450px;max-width:90vw;" onclick="event.stopPropagation()"><div class="card-header"><span class="card-title">📝 Use Template: ' + this.esc(t.title) + '</span><button class="btn btn-ghost btn-xs" onclick="this.closest(\'div[style]\').remove()">✕</button></div>' +
                    '<div class="form-group"><label>To</label><select id="tplContact" style="width:100%;padding:10px;border:1.5px solid #E5E5E5;border-radius:8px;">' + contacts.map(function(c) { return '<option value="' + c.id + '">' + c.name + ' - ' + c.mobile + '</option>'; }).join('') + '</select></div>' +
                    '<div class="form-group"><label>Message</label><textarea id="tplMsg" rows="4" style="width:100%;padding:10px;border:1.5px solid #E5E5E5;border-radius:8px;">' + this.esc(t.body) + '</textarea></div>' +
                    '<button class="btn btn-wa btn-sm" onclick="WhatsApp.sendTemplate(\'' + templateId + '\')">📤 Send</button></div></div>';
                document.body.insertAdjacentHTML('beforeend', h);
            },
            
            sendTemplate: function(templateId) {
                var contactId = document.getElementById('tplContact')?.value;
                var text = document.getElementById('tplMsg')?.value?.trim();
                if (!contactId || !text) return;
                var contact = this.contacts.find(function(c) { return c.id === contactId; });
                this.messages.push({ id: 'MSG' + Date.now(), contactId: contactId, contactName: contact ? contact.name : 'Unknown', contactMobile: contact ? contact.mobile : '', text: text, type: 'sent', status: 'delivered', time: new Date().toISOString() });
                this.saveMessages();
                this.currentTab = 'chat';
                this.activeChat = contactId;
                this.render();
                this.toast('✅ Template sent!', 'success');
                document.querySelector('#tplContact')?.closest('div[style]')?.remove();
            },
            
            addTemplate: function() {
                var title = prompt('Template name:');
                if (!title?.trim()) return;
                var body = prompt('Template message (use {{name}}, {{amount}} etc.):');
                if (!body?.trim()) return;
                this.templates.unshift({ id: 'TPL' + String(this.templates.length + 1).padStart(3, '0'), title: title.trim(), body: body.trim(), category: 'Custom' });
                localStorage.setItem('crm_wa_templates', JSON.stringify(this.templates));
                this.renderTemplates();
                this.toast('✅ Template added!', 'success');
            },
            
            renderBroadcast: function() {
                var self = this;
                var container = document.getElementById('broadcastContacts');
                container.innerHTML = this.contacts.slice(0, 20).map(function(c) {
                    return '<label style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#F5F5F5;border-radius:8px;font-size:0.82rem;cursor:pointer;">' +
                        '<input type="checkbox" class="bc-check" value="' + c.id + '"> ' + self.esc(c.name) + ' (' + c.mobile + ')</label>';
                }).join('');
            },
            
            sendBroadcast: function() {
                var self = this;
                var text = document.getElementById('broadcastMsg')?.value?.trim();
                if (!text) { this.toast('Enter a message!', 'error'); return; }
                var selected = [];
                document.querySelectorAll('.bc-check:checked').forEach(function(cb) { selected.push(cb.value); });
                if (selected.length === 0) { this.toast('Select at least one recipient!', 'error'); return; }
                
                selected.forEach(function(contactId) {
                    var contact = self.contacts.find(function(c) { return c.id === contactId; });
                    if (contact) {
                        self.messages.push({ id: 'MSG' + Date.now() + Math.random(), contactId: contactId, contactName: contact.name, contactMobile: contact.mobile, text: text, type: 'sent', status: 'delivered', time: new Date().toISOString() });
                    }
                });
                this.saveMessages();
                document.getElementById('broadcastMsg').value = '';
                this.toast('📢 Broadcast sent to ' + selected.length + ' contacts!', 'success');
            },
            
            filterContacts: function() { this.renderChat(); },
            filterTemplates: function() { this.renderTemplates(); },
            
            toast: function(m, t) { t = t || 'info'; var d = document.createElement('div'); d.className = 'toast toast-' + t; d.textContent = m; (document.getElementById('toastContainer') || document.body).appendChild(d); setTimeout(function() { d.remove(); }, 3000); },
            esc: function(s) { return s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; },
            timeAgo: function(d) { if (!d) return ''; var s = Math.floor((Date.now() - new Date(d).getTime()) / 1000); if (s < 60) return 'Just now'; if (s < 3600) return Math.floor(s / 60) + 'm ago'; if (s < 86400) return Math.floor(s / 3600) + 'h ago'; return Math.floor(s / 86400) + 'd ago'; }
        };
        
        document.addEventListener('DOMContentLoaded', function() { WhatsApp.init(); });
    </script>
</body>
</html>

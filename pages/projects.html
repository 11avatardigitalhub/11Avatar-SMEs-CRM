<!DOCTYPE html>
<html lang="en" data-theme="internal">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#F8F6F0" />
    <title>Projects - 11 Avatar Digital Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/crm-design-system.css" />
    <link rel="stylesheet" href="../css/app.css" />
    
    <style>
        :root {
            --card-3d: 0 4px 6px -1px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.05);
            --card-hover: 0 10px 25px -5px rgba(0,0,0,0.08), 0 20px 40px -10px rgba(0,0,0,0.06);
            --gold: #D4AF37; --gold-dark: #B8960F; --gold-gradient: linear-gradient(135deg, #E8C95A, #D4AF37, #B8960F);
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6;
            color: #0A0A0A; background: linear-gradient(135deg, #F8F6F0, #F3F1EB, #F0EDE5, #F5F3ED);
            min-height: 100vh; -webkit-font-smoothing: antialiased; margin: 0;
        }
        
        .projects-container { max-width: 100%; margin: 0 auto; padding: 16px; padding-bottom: 90px; }
        
        .bottom-submenu {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: #FFF; border-top: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
            padding: 8px 16px; padding-bottom: max(8px, env(safe-area-inset-bottom));
            display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
            justify-content: center; flex-wrap: wrap;
        }
        .bottom-submenu::-webkit-scrollbar { display: none; }
        .bottom-tab {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            padding: 10px 16px; border-radius: 12px; cursor: pointer;
            font-size: 0.7rem; font-weight: 500; color: #777;
            transition: all 0.2s ease; white-space: nowrap; min-width: 65px;
            border: 1.5px solid transparent; background: transparent;
        }
        .bottom-tab:hover { background: rgba(212,175,55,0.05); color: #333; }
        .bottom-tab.active { background: rgba(212,175,55,0.1); color: #B8960F; font-weight: 600; border-color: rgba(212,175,55,0.3); }
        .bottom-tab .tab-icon { font-size: 1.3rem; }
        
        .page-header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
            padding: 24px 28px; background: linear-gradient(135deg, #FFF, #FFFDF7, #FFFAEE);
            border: 1px solid rgba(212,175,55,0.15); border-radius: 20px;
            box-shadow: var(--card-3d); margin-bottom: 20px;
        }
        .page-header h1 { font-size: 1.6rem; font-weight: 800; margin: 0; }
        .page-header .gold { background: linear-gradient(135deg, #D4AF37, #B8960F); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header p { color: #888; margin: 2px 0 0; font-size: 0.88rem; }
        
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: all 0.2s ease; border: none; text-decoration: none; }
        .btn-primary { background: var(--gold-gradient); color: #FFF; }
        .btn-primary:hover { box-shadow: 0 4px 20px rgba(212,175,55,0.3); transform: translateY(-1px); }
        .btn-outline { background: transparent; color: #B8960F; border: 1.5px solid #D4AF37; }
        .btn-outline:hover { background: rgba(212,175,55,0.08); }
        .btn-sm { padding: 6px 14px; font-size: 0.78rem; }
        .btn-xs { padding: 3px 8px; font-size: 0.68rem; border-radius: 5px; }
        .btn-ghost { background: transparent; color: #666; }
        .btn-ghost:hover { background: #F5F5F5; }
        .btn-danger { background: #DC2626; color: #FFF; }
        .btn-success { background: #10B981; color: #FFF; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
        @media(max-width:768px){ .stats-row{grid-template-columns:repeat(2,1fr);} }
        .stat-card {
            background: #FFF; border: 1px solid rgba(0,0,0,0.06); border-radius: 14px;
            padding: 16px 18px; cursor: pointer; transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--card-hover); border-color: rgba(212,175,55,0.2); }
        .stat-card .val { font-size: 1.5rem; font-weight: 800; font-family: 'Poppins',sans-serif; }
        .stat-card .lbl { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .card { background: #FFF; border: 1px solid rgba(0,0,0,0.06); border-radius: 20px; padding: 24px; box-shadow: var(--card-3d); margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-title { font-size: 1.1rem; font-weight: 700; font-family: 'Poppins',sans-serif; }
        
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .filter-row input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1.5px solid #E5E5E5; border-radius: 10px; font-size: 0.88rem; }
        .filter-row input:focus { border-color: var(--gold); outline: none; }
        .filter-row select { padding: 10px 14px; border: 1.5px solid #E5E5E5; border-radius: 10px; font-size: 0.88rem; background: #FFF; cursor: pointer; min-width: 140px; }
        
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        table th { text-align: left; padding: 12px 14px; font-weight: 600; color: #666; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; background: #FAFAFA; border-bottom: 2px solid #F0EDE5; white-space: nowrap; }
        table td { padding: 12px 14px; border-bottom: 1px solid #F5F5F5; color: #333; }
        table tbody tr { transition: background 0.15s ease; cursor: pointer; }
        table tbody tr:hover { background: rgba(212,175,55,0.03); }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
        .badge-planning { background: #EFF6FF; color: #2563EB; }
        .badge-progress { background: #FEF3C7; color: #D97706; }
        .badge-review { background: #F5F3FF; color: #7C3AED; }
        .badge-completed { background: #ECFDF5; color: #059669; }
        .badge-onhold { background: #FEE2E2; color: #DC2626; }
        
        .tbl-actions { display: flex; gap: 3px; }
        .tbl-btn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid #E5E5E5; background: #FFF; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; transition: all 0.15s ease; }
        .tbl-btn:hover { background: #F5F5F5; border-color: #D4AF37; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media(max-width:600px){ .form-row{grid-template-columns:1fr;} }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.8rem; color: #333; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px; border: 1.5px solid #E5E5E5;
            border-radius: 10px; font-size: 0.88rem; font-family: 'Inter',sans-serif;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); outline: none; }
        .form-group textarea { resize: vertical; min-height: 70px; }
        
        .detail-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2999; }
        .detail-panel {
            position: fixed; top: 0; right: 0; width: 480px; max-width: 95vw; height: 100vh;
            background: #FFF; box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            z-index: 3000; overflow-y: auto; padding: 24px; animation: slideIn 0.2s ease;
        }
        @keyframes slideIn { from{transform:translateX(100%);} to{transform:translateX(0);} }
        
        .health-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .health-green { background: #10B981; }
        .health-yellow { background: #F59E0B; }
        .health-red { background: #DC2626; }
        
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: #FFF; border-radius: 12px; padding: 14px 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); font-size: 0.88rem; font-weight: 500; animation: toastIn 0.3s ease; }
        .toast-success { border-left: 4px solid #10B981; } .toast-error { border-left: 4px solid #DC2626; } .toast-info { border-left: 4px solid #3B82F6; }
        @keyframes toastIn { from{opacity:0;transform:translateX(100%);} to{opacity:1;transform:translateX(0);} }
        
        .empty-state { text-align: center; padding: 50px; color: #999; }
        .empty-icon { font-size: 3.5rem; margin-bottom: 10px; opacity: 0.5; }
        
        .text-xs { font-size: 0.75rem; } .text-sm { font-size: 0.85rem; } .text-muted { color: #888; }
        .font-semibold { font-weight: 600; } .font-bold { font-weight: 700; }
        .flex { display: flex; } .items-center { align-items: center; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
        .flex-wrap { flex-wrap: wrap; } .flex-between { justify-content: space-between; }
        .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mb-2 { margin-bottom: 8px; }
        
        @media(max-width:768px){ .projects-container{padding:16px;padding-bottom:100px;} .page-header{padding:18px;flex-direction:column;text-align:center;} .detail-panel{width:100%;} }
    </style>
</head>
<body>

    <div class="projects-container">
        
        <div class="page-header">
            <div>
                <h1>🚀 <span class="gold">Projects</span> Tracker</h1>
                <p id="projectCountText">Loading projects...</p>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button class="btn btn-outline btn-sm" onclick="Projects.exportCSV()">📤 Export</button>
                <button class="btn btn-primary" onclick="Projects.openForm()">➕ New Project</button>
            </div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card"><div class="val" id="stat-total">0</div><div class="lbl">Total Projects</div></div>
            <div class="stat-card"><div class="val" id="stat-active" style="color:#D97706;">0</div><div class="lbl">🔄 Active</div></div>
            <div class="stat-card"><div class="val" id="stat-completed" style="color:#059669;">0</div><div class="lbl">✅ Completed</div></div>
            <div class="stat-card"><div class="val" id="stat-budget" style="color:#D4AF37;">₹0</div><div class="lbl">💰 Total Budget</div></div>
        </div>
        
        <!-- TAB: All Projects -->
        <div id="tab-all" class="tab-content active">
            <div class="filter-row">
                <input type="search" id="searchInput" placeholder="🔍 Search projects..." oninput="Projects.search=this.value;Projects.render()">
                <select id="filterStatus" onchange="Projects.filterStatus=this.value;Projects.render()">
                    <option value="">All Status</option><option value="Planning">Planning</option><option value="In Progress">In Progress</option><option value="Review">Review</option><option value="Completed">Completed</option><option value="On Hold">On Hold</option>
                </select>
                <button class="btn btn-ghost btn-sm" onclick="Projects.clearFilters()">✕ Clear</button>
            </div>
            <div class="card" style="padding:0;overflow:hidden;">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Project</th><th>Client</th><th>Service</th><th>Start</th><th>Deadline</th><th>Budget</th><th>Status</th><th>Health</th><th style="min-width:100px;">Actions</th></tr></thead>
                        <tbody id="projectTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- TAB: Add Project -->
        <div id="tab-add" class="tab-content">
            <div class="card" style="max-width:750px;">
                <div class="card-header"><span class="card-title" id="formTitle">➕ New Project</span></div>
                <form id="projectForm" onsubmit="Projects.saveProject(event)">
                    <input type="hidden" id="editId">
                    <div class="form-row">
                        <div class="form-group"><label>Project Name *</label><input type="text" id="pName" required></div>
                        <div class="form-group"><label>Client *</label><select id="pClient" required><option value="">Select Client...</option></select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Service Type</label><input type="text" id="pService" placeholder="e.g., Website Development, SEO"></div>
                        <div class="form-group"><label>Status</label><select id="pStatus"><option>Planning</option><option>In Progress</option><option>Review</option><option>Completed</option><option>On Hold</option></select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Start Date</label><input type="date" id="pStartDate"></div>
                        <div class="form-group"><label>Deadline</label><input type="date" id="pDeadline"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Budget (₹)</label><input type="number" id="pBudget" min="0"></div>
                        <div class="form-group"><label>Spent (₹)</label><input type="number" id="pSpent" min="0"></div>
                    </div>
                    <div class="form-group"><label>Team Members</label><input type="text" id="pTeam" placeholder="Comma-separated names"></div>
                    <div class="form-group"><label>Notes</label><textarea id="pNotes" rows="3"></textarea></div>
                    <div class="flex gap-2 mt-2">
                        <button type="submit" class="btn btn-primary">💾 Save Project</button>
                        <button type="button" class="btn btn-outline" onclick="Projects.currentTab='all';Projects.render()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
    
    <!-- Detail Panel -->
    <div id="detailPanel"></div>
    
    <!-- Bottom Submenu -->
    <div class="bottom-submenu">
        <div class="bottom-tab active" onclick="Projects.currentTab='all';Projects.render()"><span class="tab-icon">📋</span> All</div>
        <div class="bottom-tab" onclick="Projects.currentTab='add';Projects.render()"><span class="tab-icon">➕</span> Add</div>
        <div class="bottom-tab" onclick="window.location.href='tasks.html'"><span class="tab-icon">✅</span> Tasks</div>
        <div class="bottom-tab" onclick="window.location.href='clients.html'"><span class="tab-icon">🏢</span> Clients</div>
        <div class="bottom-tab" onclick="window.location.href='pipeline.html'"><span class="tab-icon">📈</span> Pipeline</div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        'use strict';
        
        var Projects = {
            currentTab: 'all',
            search: '',
            filterStatus: '',
            
            init: function() {
                this.data = JSON.parse(localStorage.getItem('crm_projects') || '[]');
                if (this.data.length === 0) this.seedData();
                this.loadClients();
                this.render();
            },
            
            seedData: function() {
                this.data = [
                    { id:'PRJ001',name:'Website Redesign',client:'ABC Corporation',clientId:'CL004',service:'Website Development',status:'In Progress',startDate:'2025-01-01',deadline:'2025-03-15',budget:300000,spent:180000,team:'Admin, Developer',notes:'Phase 2 in progress',created:new Date().toISOString() },
                    { id:'PRJ002',name:'SEO Campaign - Q1',client:'Kumar Enterprises',clientId:'CL001',service:'SEO',status:'Completed',startDate:'2025-01-01',deadline:'2025-03-31',budget:150000,spent:150000,team:'Admin',notes:'All deliverables met',created:new Date().toISOString() },
                    { id:'PRJ003',name:'Social Media Management',client:'Sharma Textiles',clientId:'CL002',service:'Social Media',status:'Planning',startDate:'2025-02-01',deadline:'2025-06-30',budget:120000,spent:0,team:'Manager',notes:'Kickoff meeting scheduled',created:new Date().toISOString() }
                ];
                this.save();
            },
            
            save: function() { try { localStorage.setItem('crm_projects', JSON.stringify(this.data)); } catch(e) {} },
            
            loadClients: function() {
                var clients = JSON.parse(localStorage.getItem('crm_clients') || '[]');
                var sel = document.getElementById('pClient');
                if (sel) sel.innerHTML = '<option value="">Select Client...</option>' + clients.map(function(c){ return '<option value="'+c.name+'">'+c.name+' - '+c.business+'</option>'; }).join('');
            },
            
            getFiltered: function() {
                var self = this;
                return this.data.filter(function(p) {
                    if (self.search && !(p.name?.toLowerCase().includes(self.search)||p.client?.toLowerCase().includes(self.search)||p.service?.toLowerCase().includes(self.search))) return false;
                    if (self.filterStatus && p.status !== self.filterStatus) return false;
                    return true;
                });
            },
            
            getHealth: function(p) {
                if (p.status === 'Completed') return { color:'health-green', label:'Done' };
                if (p.status === 'On Hold') return { color:'health-red', label:'Hold' };
                if (p.deadline && new Date(p.deadline) < new Date() && p.status !== 'Completed') return { color:'health-red', label:'Overdue' };
                if (p.budget > 0 && p.spent > p.budget) return { color:'health-red', label:'Over Budget' };
                if (p.budget > 0 && p.spent / p.budget > 0.8) return { color:'health-yellow', label:'Warning' };
                return { color:'health-green', label:'On Track' };
            },
            
            render: function() {
                var tabs = ['all','add'];
                document.querySelectorAll('.bottom-tab').forEach(function(tab, i) {
                    if (i < tabs.length) tab.classList.toggle('active', tabs[i] === Projects.currentTab);
                });
                
                document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
                var tabEl = document.getElementById('tab-' + this.currentTab);
                if (tabEl) tabEl.classList.add('active');
                
                var totalBudget = this.data.reduce(function(s,p){return s+(parseInt(p.budget)||0);},0);
                document.getElementById('stat-total').textContent = this.data.length;
                document.getElementById('stat-active').textContent = this.data.filter(function(p){return !['Completed'].includes(p.status);}).length;
                document.getElementById('stat-completed').textContent = this.data.filter(function(p){return p.status==='Completed';}).length;
                document.getElementById('stat-budget').textContent = '₹' + totalBudget.toLocaleString('en-IN');
                document.getElementById('projectCountText').textContent = this.getFiltered().length + ' projects';
                
                if (this.currentTab === 'all') this.renderTable();
                if (this.currentTab === 'add') this.loadClients();
            },
            
            renderTable: function() {
                var filtered = this.getFiltered();
                var tbody = document.getElementById('projectTableBody');
                var self = this;
                var badges = {Planning:'badge-planning','In Progress':'badge-progress',Review:'badge-review',Completed:'badge-completed','On Hold':'badge-onhold'};
                
                tbody.innerHTML = filtered.length === 0 ? '<tr><td colspan="9"><div class="empty-state"><p>No projects found</p></div></td></tr>' :
                    filtered.map(function(p) {
                        var health = self.getHealth(p);
                        return '<tr onclick="Projects.openDetail(\''+p.id+'\')">'+
                            '<td><strong>'+self.esc(p.name)+'</strong></td>'+
                            '<td>'+self.esc(p.client)+'</td>'+
                            '<td>'+self.esc(p.service||'-')+'</td>'+
                            '<td>'+self.fd(p.startDate)+'</td>'+
                            '<td>'+self.fd(p.deadline)+'</td>'+
                            '<td><strong>₹'+parseInt(p.budget||0).toLocaleString('en-IN')+'</strong></td>'+
                            '<td><span class="badge '+badges[p.status]+'">'+p.status+'</span></td>'+
                            '<td><span class="health-indicator '+health.color+'" title="'+health.label+'"></span> '+health.label+'</td>'+
                            '<td><div class="tbl-actions" onclick="event.stopPropagation();">'+
                                '<button class="tbl-btn" onclick="Projects.openDetail(\''+p.id+'\')" title="View">👁️</button>'+
                                '<button class="tbl-btn" onclick="Projects.editProject(\''+p.id+'\')" title="Edit">✏️</button>'+
                                '<button class="tbl-btn" onclick="Projects.deleteProject(\''+p.id+'\')" style="color:#DC2626;" title="Delete">🗑️</button>'+
                            '</div></td></tr>';
                    }).join('');
            },
            
            openForm: function() { this.currentTab = 'add'; this.render(); },
            
            editProject: function(id) {
                this.currentTab = 'add'; this.render();
                var p = this.data.find(function(x){return x.id===id;});
                if (p) {
                    document.getElementById('editId').value = p.id;
                    document.getElementById('formTitle').textContent = '✏️ Edit: '+p.name;
                    document.getElementById('pName').value=p.name||''; document.getElementById('pClient').value=p.client||'';
                    document.getElementById('pService').value=p.service||''; document.getElementById('pStatus').value=p.status||'Planning';
                    document.getElementById('pStartDate').value=p.startDate||''; document.getElementById('pDeadline').value=p.deadline||'';
                    document.getElementById('pBudget').value=p.budget||''; document.getElementById('pSpent').value=p.spent||'';
                    document.getElementById('pTeam').value=p.team||''; document.getElementById('pNotes').value=p.notes||'';
                }
            },
            
            saveProject: function(e) {
                e.preventDefault();
                var id = document.getElementById('editId').value;
                var d = {
                    name:document.getElementById('pName').value.trim(),
                    client:document.getElementById('pClient').value,
                    service:document.getElementById('pService').value.trim(),
                    status:document.getElementById('pStatus').value,
                    startDate:document.getElementById('pStartDate').value,
                    deadline:document.getElementById('pDeadline').value,
                    budget:parseInt(document.getElementById('pBudget').value)||0,
                    spent:parseInt(document.getElementById('pSpent').value)||0,
                    team:document.getElementById('pTeam').value.trim(),
                    notes:document.getElementById('pNotes').value.trim()
                };
                if (!d.name||!d.client) { this.toast('Name and client required!','error'); return; }
                
                if (id) {
                    var i = this.data.findIndex(function(x){return x.id===id;});
                    if (i!==-1) { d.id=id; d.created=this.data[i].created; this.data[i]=d; this.toast('✅ Project updated!','success'); }
                } else {
                    d.id='PRJ'+String(this.data.length+1).padStart(3,'0'); d.created=new Date().toISOString();
                    this.data.unshift(d); this.toast('✅ Project created!','success');
                }
                this.save(); this.currentTab='all'; this.render();
            },
            
            deleteProject: function(id) {
                if (!confirm('Delete this project?')) return;
                this.data = this.data.filter(function(p){return p.id!==id;});
                this.save(); this.render(); this.toast('🗑️ Project deleted','info');
            },
            
            openDetail: function(id) {
                var p = this.data.find(function(x){return x.id===id;});
                if (!p) return;
                var self = this;
                var health = this.getHealth(p);
                var spentPercent = p.budget>0 ? Math.round((p.spent/p.budget)*100) : 0;
                
                var h = '<div class="detail-backdrop" onclick="Projects.closeDetail()"></div><div class="detail-panel">';
                h += '<div class="flex-between mb-2"><h5 style="margin:0;">'+self.esc(p.name)+'</h5><div><button class="btn btn-danger btn-xs" onclick="Projects.deleteProject(\''+p.id+'\')">🗑️</button> <button class="btn btn-ghost btn-xs" onclick="Projects.closeDetail()">✕</button></div></div>';
                h += '<div class="text-sm text-muted mb-3">🏢 '+self.esc(p.client)+' · '+self.esc(p.service||'N/A')+'</div>';
                h += '<div class="flex gap-2 mb-3"><span class="badge '+(p.status==='Completed'?'badge-completed':p.status==='In Progress'?'badge-progress':p.status==='Planning'?'badge-planning':'badge-onhold')+'">'+p.status+'</span><span class="health-indicator '+health.color+'"></span> '+health.label+'</div>';
                h += '<div class="text-sm"><strong>Start:</strong> '+self.fd(p.startDate)+' &nbsp; <strong>Deadline:</strong> '+self.fd(p.deadline)+'</div>';
                h += '<div class="mt-2"><strong>Budget:</strong> ₹'+parseInt(p.budget||0).toLocaleString('en-IN')+' &nbsp; <strong>Spent:</strong> ₹'+parseInt(p.spent||0).toLocaleString('en-IN')+' ('+spentPercent+'%)</div>';
                h += '<div class="mt-2"><strong>Team:</strong> '+self.esc(p.team||'N/A')+'</div>';
                if (p.notes) h += '<div class="text-sm text-muted mt-2">📝 '+self.esc(p.notes)+'</div>';
                h += '<div class="text-xs text-muted mt-3">Created: '+self.fd(p.created)+'</div>';
                h += '<div class="flex gap-2 mt-3"><button class="btn btn-outline btn-sm" onclick="Projects.editProject(\''+p.id+'\')">✏️ Edit</button><button class="btn btn-ghost btn-sm" onclick="Projects.closeDetail()">Close</button></div>';
                h += '</div>';
                document.getElementById('detailPanel').innerHTML = h;
            },
            
            closeDetail: function() { document.getElementById('detailPanel').innerHTML = ''; },
            
            clearFilters: function() {
                this.search=''; this.filterStatus='';
                document.getElementById('searchInput').value=''; document.getElementById('filterStatus').value='';
                this.render();
            },
            
            exportCSV: function() {
                var csv='ID,Name,Client,Service,Status,Start,Deadline,Budget,Spent,Team\n';
                csv+=this.data.map(function(p){return [p.id,p.name,p.client,p.service,p.status,p.startDate,p.deadline,p.budget,p.spent,p.team].map(function(v){return'"'+(v||'')+'"';}).join(',');}).join('\n');
                var b=new Blob([csv],{type:'text/csv'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='projects.csv'; a.click();
                this.toast('📤 Exported!','success');
            },
            
            toast: function(m,t){ t=t||'info'; var d=document.createElement('div'); d.className='toast toast-'+t; d.textContent=m; (document.getElementById('toastContainer')||document.body).appendChild(d); setTimeout(function(){ d.remove(); },3000); },
            esc: function(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; },
            fd: function(d){ if(!d)return'-'; try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;} }
        };
        
        document.addEventListener('DOMContentLoaded', function() { Projects.init(); });
    </script>
</body>
</html>

    <style>
        /* ============================================================
           CRITICAL INLINE STYLES — Guaranteed to render
           ============================================================ */
        :root {
            --gold-light: #E8C95A;
            --gold: #D4AF37;
            --gold-dark: #B8960F;
            --gold-gradient: linear-gradient(135deg, #E8C95A, #D4AF37, #B8960F);
            --gold-text-gradient: linear-gradient(135deg, #E8C95A, #D4AF37, #B8960F);
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-md: 16px;
            --radius-full: 9999px;
            --transition: 0.25s ease;
            --transition-fast: 0.15s ease;
            --sidebar-width: 260px;
            --sidebar-collapsed: 64px;
            --header-height: 60px;
        }

        [data-theme="light"] {
            --bg-primary: #F8F6F0;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F0EDE5;
            --bg-glass: rgba(255,255,255,0.8);
            --text-primary: #0A0A0A;
            --text-secondary: #333333;
            --text-muted: #777777;
            --text-placeholder: #999999;
            --border-color: rgba(0,0,0,0.06);
            --border-color-strong: rgba(0,0,0,0.12);
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.10);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.12);
            --bg-input: #FFFFFF;
            --bg-hover: rgba(212,175,55,0.06);
            --bg-active: rgba(212,175,55,0.12);
            --success: #10B981;
            --error: #DC2626;
            --warning: #F59E0B;
            --info: #3B82F6;
            --success-bg: rgba(16,185,129,0.08);
            --error-bg: rgba(220,38,38,0.08);
            --warning-bg: rgba(245,158,11,0.08);
            --info-bg: rgba(59,130,246,0.08);
        }

        [data-theme="dark"] {
            --bg-primary: #0A0A0A;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #252525;
            --bg-glass: rgba(10,10,10,0.85);
            --text-primary: #FFFFFF;
            --text-secondary: #CCCCCC;
            --text-muted: #888888;
            --text-placeholder: #666666;
            --border-color: rgba(255,255,255,0.08);
            --border-color-strong: rgba(255,255,255,0.15);
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
            --shadow: 0 4px 16px rgba(0,0,0,0.5);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.6);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.7);
            --bg-input: #1E1E1E;
            --bg-hover: rgba(255,255,255,0.06);
            --bg-active: rgba(212,175,55,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; font-size: 16px; }
        body {
            font-family: var(--font-body);
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-primary);
            margin: 0; padding: 0;
            display: flex;
            min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--gold-dark); text-decoration: none; }
        a:hover { color: var(--gold); }
        h1,h2,h3,h4,h5,h6 { font-family: var(--font-heading); color: var(--text-primary); margin-bottom: 12px; line-height: 1.3; }
        h1 { font-size: 1.5rem; font-weight: 800; }
        h2 { font-size: 1.3rem; font-weight: 700; }
        h3 { font-size: 1.1rem; font-weight: 600; }
        button { font-family: var(--font-body); cursor: pointer; }
        input, select, textarea { font-family: var(--font-body); font-size: 14px; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color-strong); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-dark); }

        /* SKIP LINK */
        .skip-link { position: fixed; top: -100%; left: 16px; z-index: 9999; padding: 12px 20px; background: var(--gold); color: #000; font-weight: 700; border-radius: 8px; font-size: 14px; transition: top 0.15s; }
        .skip-link:focus { top: 16px; }
        .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

        /* ============================================================
           SIDEBAR
           ============================================================ */
        .app-sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            z-index: 300;
            transition: width var(--transition), transform var(--transition);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .app-sidebar.collapsed { width: var(--sidebar-collapsed); }

        .sidebar-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; height: var(--header-height);
            border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; min-width: 0; }
        .sidebar-logo svg { width: 34px; height: 34px; flex-shrink: 0; }
        .sidebar-brand-text { font-family: var(--font-heading); font-weight: 800; font-size: 15px; color: var(--text-primary); line-height: 1.1; white-space: nowrap; overflow: hidden; transition: opacity var(--transition); }
        .sidebar-brand-sub { font-size: 9px; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
        .collapsed .sidebar-brand-text, .collapsed .sidebar-brand-sub { opacity: 0; width: 0; }

        .sidebar-collapse-btn {
            margin-left: auto; width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid var(--border-color); background: var(--bg-glass);
            color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 13px; transition: all var(--transition); flex-shrink: 0;
        }
        .sidebar-collapse-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--gold); }

        .sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px; scrollbar-width: thin; }
        .nav-section { margin-bottom: 14px; }
        .nav-section-title {
            font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.08em; padding: 6px 12px; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; transition: opacity var(--transition);
        }
        .collapsed .nav-section-title { opacity: 0; height: 0; padding: 0; margin: 0; }

        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: var(--radius);
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
            text-decoration: none; transition: all var(--transition-fast);
            cursor: pointer; white-space: nowrap; overflow: hidden;
            min-height: 42px; border: none; background: none;
            width: 100%; text-align: left;
        }
        .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .nav-item.active {
            background: var(--bg-active); color: var(--gold-dark); font-weight: 600;
            border-left: 3px solid var(--gold); padding-left: 11px;
        }
        .nav-item-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
        .nav-item-label { overflow: hidden; text-overflow: ellipsis; transition: opacity var(--transition); }
        .collapsed .nav-item-label { opacity: 0; width: 0; }
        .nav-item-badge {
            margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 10px;
            background: var(--gold); color: #000; font-weight: 700; flex-shrink: 0;
            transition: opacity var(--transition); min-width: 18px; text-align: center;
        }
        .collapsed .nav-item-badge { opacity: 0; }

        .sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border-color); flex-shrink: 0; }
        .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 6px; border-radius: var(--radius); cursor: pointer; transition: background var(--transition-fast); }
        .sidebar-user:hover { background: var(--bg-hover); }
        .sidebar-user-avatar {
            width: 38px; height: 38px; border-radius: 50%; background: var(--gold-gradient);
            color: #000; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; flex-shrink: 0; font-family: var(--font-heading);
        }
        .sidebar-user-info { overflow: hidden; transition: opacity var(--transition); min-width: 0; }
        .collapsed .sidebar-user-info { opacity: 0; width: 0; }
        .sidebar-user-name { font-weight: 600; font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-user-role { font-size: 10px; color: var(--text-muted); }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .app-main { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; transition: margin-left var(--transition); }
        .app-sidebar.collapsed ~ .app-main { margin-left: var(--sidebar-collapsed); }

        .app-header {
            position: sticky; top: 0; z-index: 200;
            background: var(--bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            height: var(--header-height); display: flex; align-items: center;
            padding: 0 20px; gap: 14px;
        }
        .mobile-menu-btn { display: none; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer; align-items: center; justify-content: center; font-size: 18px; transition: all var(--transition-fast); flex-shrink: 0; }
        .mobile-menu-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--gold); }

        .header-search { flex: 1; max-width: 440px; position: relative; }
        .header-search input {
            width: 100%; height: 42px; padding-left: 42px; padding-right: 14px;
            border-radius: 21px; border: 1.5px solid var(--border-color-strong);
            background: var(--bg-input); font-size: 14px; color: var(--text-primary);
            transition: all var(--transition-fast); outline: none;
        }
        .header-search input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.12); }
        .header-search input::placeholder { color: var(--text-placeholder); }
        .header-search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 15px; }

        .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
        .header-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-color);
            background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            transition: all var(--transition-fast); position: relative; flex-shrink: 0;
        }
        .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--gold); }
        .header-btn .dot {
            position: absolute; top: 6px; right: 6px; width: 8px; height: 8px;
            border-radius: 50%; background: var(--error); border: 2px solid var(--bg-secondary);
            display: none;
        }

        .header-profile {
            width: 40px; height: 40px; border-radius: 50%; background: var(--gold-gradient);
            color: #000; border: none; cursor: pointer; font-weight: 700; font-size: 14px;
            font-family: var(--font-heading); transition: all var(--transition-fast); flex-shrink: 0;
        }
        .header-profile:hover { box-shadow: 0 4px 16px rgba(212,175,55,0.35); transform: translateY(-1px); }

        /* ============================================================
           SUB MENU
           ============================================================ */
        .app-submenu {
            background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); overflow-x: auto;
            scrollbar-width: none; min-height: 44px; display: flex; align-items: center;
        }
        .app-submenu::-webkit-scrollbar { display: none; }
        .app-submenu-inner { display: flex; align-items: center; gap: 4px; padding: 0 20px; min-height: 44px; }
        .app-submenu-link {
            padding: 7px 16px; border-radius: 18px; font-size: 12px; font-weight: 500;
            color: var(--text-muted); text-decoration: none; white-space: nowrap;
            transition: all var(--transition-fast); border: none; background: none; cursor: pointer;
        }
        .app-submenu-link:hover { color: var(--text-primary); background: var(--bg-hover); }
        .app-submenu-link.active { color: var(--gold-dark); background: var(--bg-active); font-weight: 600; }

        /* ============================================================
           CONTENT AREA
           ============================================================ */
        .app-content { flex: 1; padding: 20px; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }
        .module-container { display: none; animation: fadeUp 0.3s ease forwards; }
        .module-container.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* ============================================================
           MOBILE BOTTOM NAV
           ============================================================ */
        .mobile-bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-secondary); border-top: 1px solid var(--border-color);
            z-index: 200; padding: 6px 10px; padding-bottom: max(6px, env(safe-area-inset-bottom));
            justify-content: space-around; align-items: center; box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
        }
        .mobile-nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 6px 8px; border-radius: 8px; border: none; background: none; cursor: pointer;
            font-size: 10px; color: var(--text-muted); transition: all var(--transition-fast);
            min-width: 50px; text-decoration: none;
        }
        .mobile-nav-item.active { color: var(--gold-dark); font-weight: 600; }
        .mobile-nav-icon { font-size: 1.2rem; }

        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 299; }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1024px) {
            .app-sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
            .app-sidebar.mobile-open { transform: translateX(0); box-shadow: var(--shadow-lg); }
            .app-sidebar.collapsed { width: var(--sidebar-width); transform: translateX(-100%); }
            .sidebar-overlay.show { display: block; }
            .app-main { margin-left: 0 !important; }
            .mobile-menu-btn { display: flex; }
            .mobile-bottom-nav { display: flex; }
            .app-content { padding-bottom: calc(20px + 64px); }
        }
        @media (max-width: 768px) {
            .app-header { padding: 0 12px; gap: 8px; }
            .header-search { max-width: 200px; }
            .app-content { padding: 14px; padding-bottom: calc(14px + 64px); }
        }
        @media (max-width: 480px) {
            .header-search { display: none; }
            .app-header { gap: 6px; }
        }
    </style>
</head>

        <main class="app-content" id="appContent">
            <div class="module-container active" id="module-dashboard"><div id="dashboardContent"></div></div>
            <div class="module-container" id="module-leads"><div id="leadsContent"></div></div>
            <div class="module-container" id="module-pipeline"><div id="pipelineContent"></div></div>
            <div class="module-container" id="module-clients"><div id="clientsContent"></div></div>
            <div class="module-container" id="module-invoices"><div id="invoicesContent"></div></div>
            <div class="module-container" id="module-payments"><div id="paymentsContent"></div></div>
            <div class="module-container" id="module-tasks"><div id="tasksContent"></div></div>
            <div class="module-container" id="module-projects"><div id="projectsContent"></div></div>
            <div class="module-container" id="module-retainers"><div id="retainersContent"></div></div>
            <div class="module-container" id="module-whatsapp"><div id="whatsappContent"></div></div>
            <div class="module-container" id="module-training"><div id="trainingContent"></div></div>
            <div class="module-container" id="module-referrals"><div id="referralsContent"></div></div>
            <div class="module-container" id="module-reports"><div id="reportsContent"></div></div>
            <div class="module-container" id="module-notifications"><div id="notificationsContent"></div></div>
            <div class="module-container" id="module-appointments"><div id="appointmentsContent"></div></div>
            <div class="module-container" id="module-settings"><div id="settingsContent"></div></div>
        </main>
    </div>

    <nav class="mobile-bottom-nav" id="mobileBottomNav">
        <button class="mobile-nav-item active" data-module="dashboard"><span class="mobile-nav-icon">📊</span><span>Home</span></button>
        <button class="mobile-nav-item" data-module="leads"><span class="mobile-nav-icon">👥</span><span>Leads</span></button>
        <button class="mobile-nav-item" data-module="invoices"><span class="mobile-nav-icon">🧾</span><span>Invoice</span></button>
        <button class="mobile-nav-item" data-module="whatsapp"><span class="mobile-nav-icon">💬</span><span>WA</span></button>
        <button class="mobile-nav-item" data-module="settings"><span class="mobile-nav-icon">⚙️</span><span>More</span></button>
    </nav>

    <div class="toast-container" id="appToastContainer" aria-live="polite"></div>

    <!-- ============================================================
    SCRIPTS
    ============================================================ -->
    <script src="js/core/config.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/firestore.js"></script>
    <script src="js/core/tenant.js"></script>
    <script src="js/core/router.js"></script>
    <script src="js/modules/dashboard.js"></script>

    <script>
        'use strict';
        (function() {
            var APP = {
                currentModule: 'dashboard',
                sidebarCollapsed: false,
                mobileOpen: false,
                isDark: false,
                user: { name:'Demo User', email:'demo@example.com', role:'Executive', avatar:'DU' }
            };
            var D = {};

            function cache() {
                D.sidebar = document.getElementById('appSidebar');
                D.overlay = document.getElementById('sidebarOverlay');
                D.collapseBtn = document.getElementById('sidebarCollapseBtn');
                D.sidebarNav = document.getElementById('sidebarNav');
                D.content = document.getElementById('appContent');
                D.submenu = document.getElementById('submenuInner');
                D.mobileMenuBtn = document.getElementById('mobileMenuBtn');
                D.mobileNav = document.getElementById('mobileBottomNav');
                D.search = document.getElementById('globalSearchInput');
                D.themeBtn = document.getElementById('themeToggleBtn');
                D.profileBtn = document.getElementById('headerProfileBtn');
                D.headerAvatar = document.getElementById('headerAvatar');
                D.sidebarUserName = document.getElementById('sidebarUserName');
                D.sidebarUserRole = document.getElementById('sidebarUserRole');
                D.sidebarUserAvatar = document.getElementById('sidebarUserAvatar');
                D.quickAdd = document.getElementById('quickAddBtn');
                D.notifBtn = document.getElementById('notificationsBtn');
                D.notifDot = document.getElementById('notificationDot');
                D.toastContainer = document.getElementById('appToastContainer');
            }

            function toggleSidebar() {
                APP.sidebarCollapsed = !APP.sidebarCollapsed;
                D.sidebar.classList.toggle('collapsed', APP.sidebarCollapsed);
                D.collapseBtn.innerHTML = APP.sidebarCollapsed ? '▶' : '◀';
                try { localStorage.setItem('sb', APP.sidebarCollapsed?'1':'0'); } catch(e){}
            }

            function openMobile() { APP.mobileOpen = true; D.sidebar.classList.add('mobile-open'); D.overlay.classList.add('show'); document.body.style.overflow='hidden'; }
            function closeMobile() { APP.mobileOpen = false; D.sidebar.classList.remove('mobile-open'); D.overlay.classList.remove('show'); document.body.style.overflow=''; }

            function toggleTheme() {
                APP.isDark = !APP.isDark;
                document.documentElement.setAttribute('data-theme', APP.isDark?'dark':'light');
                D.themeBtn.innerHTML = APP.isDark ? '☀️' : '🌙';
                try { localStorage.setItem('crm_theme', APP.isDark?'dark':'light'); } catch(e){}
            }

            function loadTheme() {
                var s = localStorage.getItem('crm_theme');
                if (s==='dark') APP.isDark=true; else if (s==='light') APP.isDark=false; else APP.isDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
                document.documentElement.setAttribute('data-theme', APP.isDark?'dark':'light');
                D.themeBtn.innerHTML = APP.isDark ? '☀️' : '🌙';
            }

            function showToast(msg, type) {
                type = type || 'info';
                var t = document.createElement('div');
                t.className = 'toast toast-'+type;
                t.setAttribute('role','status');
                t.innerHTML = '<span class="toast-message">'+String(msg).replace(/</g,'&lt;')+'</span><button class="toast-close">✕</button>';
                (D.toastContainer||document.body).appendChild(t);
                var cb = t.querySelector('.toast-close');
                if(cb) cb.onclick = function(){ t.classList.add('toast-removing'); setTimeout(function(){ if(t.parentNode)t.remove(); },300); };
                setTimeout(function(){ if(t.parentNode){ t.classList.add('toast-removing'); setTimeout(function(){ if(t.parentNode)t.remove(); },300); } },4000);
            }

            function updateUserDisplay() {
                var name = APP.user.displayName || APP.user.name || 'User';
                var av = name.charAt(0).toUpperCase();
                if(D.headerAvatar) D.headerAvatar.textContent = av;
                if(D.sidebarUserName) D.sidebarUserName.textContent = name;
                if(D.sidebarUserRole) D.sidebarUserRole.textContent = APP.user.role||'Executive';
                if(D.sidebarUserAvatar) D.sidebarUserAvatar.textContent = av;
            }

            function loadUser() {
                try {
                    var saved = localStorage.getItem('crm_user');
                    if(saved) { APP.user = JSON.parse(saved); }
                } catch(e){}
                updateUserDisplay();
            }

            var SUBMENUS = {
                dashboard: ['Overview','Recent Activity','Quick Actions'],
                leads: ['All Leads','Add Lead','Import','Export'],
                pipeline: ['Kanban','List View','Forecast'],
                clients: ['All Clients','Active','Inactive'],
                invoices: ['All Invoices','Create','Pending','Paid'],
                payments: ['All Payments','Record','UPI'],
                tasks: ['My Tasks','Team','Calendar'],
                projects: ['All Projects','Gantt','Milestones'],
                retainers: ['Active','Expiring'],
                whatsapp: ['Chat','Templates','Broadcast'],
                training: ['Courses','Students'],
                referrals: ['Partners','Commissions'],
                reports: ['Revenue','Leads','Custom'],
                notifications: ['Inbox','Settings'],
                appointments: ['Calendar','Schedule'],
                settings: ['Organization','Team','Billing']
            };

            function navigateTo(moduleName) {
                if (APP.currentModule === moduleName) return;
                APP.currentModule = moduleName;
                if(D.sidebarNav) D.sidebarNav.querySelectorAll('.nav-item').forEach(function(i){
                    var is = i.dataset.module === moduleName;
                    i.classList.toggle('active', is);
                });
                if(D.mobileNav) D.mobileNav.querySelectorAll('.mobile-nav-item').forEach(function(i){
                    i.classList.toggle('active', i.dataset.module === moduleName);
                });
                if(D.content) D.content.querySelectorAll('.module-container').forEach(function(c){
                    c.classList.toggle('active', c.id==='module-'+moduleName);
                });
                updateSubmenu(moduleName);
                loadModuleContent(moduleName);
                if(D.content) D.content.scrollTop = 0;
                if(APP.mobileOpen) closeMobile();
                try { localStorage.setItem('crm_last_module', moduleName); } catch(e){}
            }

            function updateSubmenu(moduleName) {
                if(!D.submenu) return;
                var links = SUBMENUS[moduleName] || ['Overview'];
                D.submenu.innerHTML = links.map(function(l,i){ return '<span class="app-submenu-link'+(i===0?' active':'')+'">'+l+'</span>'; }).join('');
                D.submenu.querySelectorAll('.app-submenu-link').forEach(function(l){
                    l.onclick = function(){ D.submenu.querySelectorAll('.app-submenu-link').forEach(function(x){x.classList.remove('active');}); this.classList.add('active'); };
                });
            }

            function loadModuleContent(moduleName) {
                var cd = document.getElementById(moduleName+'Content');
                if(!cd) return;
                var map = {
                    dashboard:'CRM_Dashboard', leads:'CRM_Leads', pipeline:'CRM_Pipeline',
                    clients:'CRM_Clients', invoices:'CRM_Invoices', payments:'CRM_Payments',
                    tasks:'CRM_Tasks', projects:'CRM_Projects', retainers:'CRM_Retainers',
                    whatsapp:'CRM_Whatsapp', training:'CRM_Training', referrals:'CRM_Referrals',
                    reports:'CRM_Reports', notifications:'CRM_Notifications',
                    appointments:'CRM_Appointments', settings:'CRM_Settings'
                };
                var gn = map[moduleName];
                if(gn && window[gn] && typeof window[gn].render === 'function') {
                    cd.innerHTML = '';
                    try { window[gn].render(); } catch(e){ cd.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h4>Render Error</h4><p>'+e.message+'</p></div>'; }
                } else if(gn && window[gn] && typeof window[gn].init === 'function') {
                    try { window[gn].init(); } catch(e){}
                } else {
                    var mt = moduleName.charAt(0).toUpperCase()+moduleName.slice(1);
                    cd.innerHTML = '<div class="empty-state"><div class="empty-icon" style="font-size:3rem;">📦</div><h4>'+mt+' Module</h4><p class="text-muted">Content will render here.</p><button class="btn btn-primary btn-sm" onclick="window.CRM.navigateTo(\'dashboard\')">← Dashboard</button></div>';
                }
            }

            function setupEvents() {
                D.collapseBtn.onclick = toggleSidebar;
                D.mobileMenuBtn.onclick = openMobile;
                D.overlay.onclick = closeMobile;
                D.themeBtn.onclick = toggleTheme;
                D.profileBtn.onclick = function(){ showToast('Profile menu coming soon.','info'); };

                if(D.sidebarNav) D.sidebarNav.querySelectorAll('.nav-item').forEach(function(i){
                    i.onclick = function(){ navigateTo(this.dataset.module); };
                });
                if(D.mobileNav) D.mobileNav.querySelectorAll('.mobile-nav-item').forEach(function(i){
                    i.onclick = function(){ navigateTo(this.dataset.module); };
                });

                D.quickAdd.onclick = function(){ showToast('Quick Add: Lead, Invoice, Task, Payment','info'); };
                D.notifBtn.onclick = function(){ navigateTo('notifications'); };

                if(D.search) D.search.addEventListener('keypress', function(e){
                    if(e.key==='Enter'){
                        var q = this.value.trim().toLowerCase();
                        var map = {lead:'leads',client:'clients',invoic:'invoices',payment:'payments',pipeline:'pipeline',deal:'pipeline',task:'tasks',project:'projects',whatsapp:'whatsapp',report:'reports',setting:'settings',appointment:'appointments',retainer:'retainers',training:'training',referral:'referrals',notification:'notifications',dashboard:'dashboard',home:'dashboard'};
                        var found = false;
                        for(var k in map){ if(q.indexOf(k)!==-1){ navigateTo(map[k]); found=true; break; } }
                        if(!found) showToast('🔍 Searching: '+this.value,'info');
                        this.value = '';
                    }
                });

                document.addEventListener('keydown', function(e){
                    if((e.ctrlKey||e.metaKey)&&e.key==='k'){ e.preventDefault(); if(D.search)D.search.focus(); }
                    if((e.ctrlKey||e.metaKey)&&e.key==='b'){ e.preventDefault(); toggleSidebar(); }
                    if(e.key==='Escape'){ if(APP.mobileOpen) closeMobile(); }
                });

                window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', function(e){
                    if(!localStorage.getItem('crm_theme')){ APP.isDark=e.matches; document.documentElement.setAttribute('data-theme',APP.isDark?'dark':'light'); D.themeBtn.innerHTML=APP.isDark?'☀️':'🌙'; }
                });

                window.addEventListener('resize', function(){
                    var mobile = window.innerWidth<=1024;
                    D.mobileMenuBtn.style.display = mobile ? 'flex' : 'none';
                    D.mobileNav.style.display = mobile ? 'flex' : 'none';
                });
            }

            function init() {
                cache();
                loadTheme();
                loadUser();

                try { var sc = localStorage.getItem('sb'); if(sc==='1'){ APP.sidebarCollapsed=true; D.sidebar.classList.add('collapsed'); D.collapseBtn.innerHTML='▶'; } } catch(e){}

                setupEvents();
                window.dispatchEvent(new Event('resize'));

                var lm = localStorage.getItem('crm_last_module') || 'dashboard';
                navigateTo(lm);
                updateSubmenu(lm);
                loadModuleContent(lm);

                console.log('🚀 11 Avatar CRM App Ready');
                console.log('👤 '+APP.user.name+' | 🌓 '+(APP.isDark?'Dark':'Light')+' | 📦 '+APP.currentModule);
            }

            if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
            else init();

            window.CRM = {
                STATE: APP,
                navigateTo: navigateTo,
                toggleSidebar: toggleSidebar,
                toggleTheme: toggleTheme,
                showToast: showToast,
                updateUserDisplay: updateUserDisplay
            };
            console.log('✅ window.CRM ready — navigateTo(), showToast(), toggleTheme()');
        })();
    </script>
</body>
</html>

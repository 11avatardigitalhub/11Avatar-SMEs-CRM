<!DOCTYPE html>
<html lang="en-IN" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#F8F6F0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23D4AF37'/%3E%3Ctext x='50' y='68' font-size='38' text-anchor='middle' fill='%230A0A0A' font-weight='900' font-family='Poppins,sans-serif'%3E11A%3C/text%3E%3C/svg%3E" />
    <title>11 Avatar SMEs CRM</title>
    <style>
        body { margin:0; background:#F8F6F0; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Inter',sans-serif; }
        .spinner { width:48px; height:48px; border:4px solid #E5E5E5; border-top-color:#D4AF37; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body>
    <div style="text-align:center;">
        <div class="spinner" style="margin:0 auto 16px;"></div>
        <p style="color:#777;">Loading...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/core/config.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/firestore.js"></script>
    <script src="js/core/tenant.js"></script>
    <script>
        'use strict';
        
        (async function() {
            try {
                // Wait for Firebase Auth
                var user = await new Promise(function(resolve) {
                    var check = setInterval(function() {
                        if (window.firebase && window.firebase.auth && window.firebase.auth().currentUser) {
                            clearInterval(check);
                            resolve(window.firebase.auth().currentUser);
                        }
                    }, 300);
                    setTimeout(function() { clearInterval(check); resolve(null); }, 10000);
                });
                
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // Get user role from Firestore
                var userDoc = null;
                if (window.CRM_Firestore && window.CRM_Firestore.isAvailable()) {
                    userDoc = await window.CRM_Firestore.getDocument('users', user.uid);
                }
                
                var role = (userDoc && userDoc.role) || 'EXECUTIVE';
                var approval = (userDoc && userDoc.approvalStatus) || 'pending';
                
                // Save to localStorage for sub-pages
                if (userDoc) {
                    localStorage.setItem('crm_user', JSON.stringify(userDoc));
                }
                
                // Route based on role
                if (approval === 'pending' && role !== 'PLATFORM_OWNER') {
                    window.location.href = 'pages/dashboard.html';
                } else if (role === 'PLATFORM_OWNER') {
                    window.location.href = 'pages/dashboard.html';
                } else if (role === 'TENANT_ADMIN' || role === 'SUB_ADMIN') {
                    window.location.href = 'pages/dashboard.html';
                } else {
                    window.location.href = 'pages/dashboard.html';
                }
                
            } catch(e) {
                window.location.href = 'pages/dashboard.html';
            }
        })();
    </script>
</body>
</html>
